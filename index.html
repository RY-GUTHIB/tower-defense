<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>塔防风云 - 抽卡塔防</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 20px;border-radius:8px;font:14px sans-serif;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:100;}
#toast.show{opacity:1;}
#modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:200;}
#modalOverlay.active{display:flex;}
#modalBox{background:#2E2E3E;border-radius:12px;padding:24px;width:280px;text-align:center;color:#fff;font:14px sans-serif;}
#modalBox h3{margin-bottom:12px;color:#FF9800;font-size:18px;}
#modalBox input{width:100%;padding:8px 12px;border:1px solid #555;border-radius:6px;background:#1a1a2e;color:#fff;font-size:16px;text-align:center;outline:none;margin-bottom:12px;}
#modalBox input:focus{border-color:#FF9800;}
#modalBox button{padding:8px 24px;border:none;border-radius:6px;font-size:14px;cursor:pointer;margin:4px;}
#modalBox .btn-confirm{background:#4CAF50;color:#fff;}
#modalBox .btn-cancel{background:#666;color:#fff;}

/* Volume widget */
#volWidget{position:fixed;top:8px;left:8px;z-index:300;display:flex;flex-direction:column;gap:4px;}
#volToggle{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.6);color:#FFD54F;border:1px solid rgba(255,255,255,0.3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
#volToggle:hover{background:rgba(0,0,0,0.85);}
#volPanel{display:none;flex-direction:column;gap:6px;background:rgba(0,0,0,0.85);border-radius:8px;padding:10px 12px;min-width:150px;border:1px solid rgba(255,255,255,0.15);}
#volPanel.open{display:flex;}
.vol-row{display:flex;align-items:center;gap:6px;}
.vol-label{color:#ccc;font:11px sans-serif;width:32px;text-align:right;flex-shrink:0;}
.vol-track{flex:1;height:8px;background:#333;border-radius:4px;cursor:pointer;position:relative;min-width:60px;}
.vol-fill{height:100%;border-radius:4px;background:#4CAF50;pointer-events:none;}
.vol-handle{position:absolute;top:50%;width:16px;height:16px;border-radius:50%;background:#FFD54F;transform:translate(-50%,-50%);pointer-events:none;border:2px solid #fff;}
.vol-val{color:#aaa;font:10px sans-serif;width:28px;text-align:center;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="toast"></div>
<div id="volWidget">
  <button id="volToggle" title="音量设置">♫</button>
  <div id="volPanel">
    <div class="vol-row"><span class="vol-label">🎵 BGM</span><div class="vol-track" data-key="bgm"><div class="vol-fill"></div><div class="vol-handle"></div></div><span class="vol-val">70</span></div>
    <div class="vol-row"><span class="vol-label">🔊 SFX</span><div class="vol-track" data-key="sfx"><div class="vol-fill"></div><div class="vol-handle"></div></div><span class="vol-val">70</span></div>
  </div>
</div>
<div id="modalOverlay"><div id="modalBox"><h3 id="modalTitle"></h3><input id="modalInput" type="text" placeholder=""><div><button class="btn-confirm" id="modalConfirm">确认</button><button class="btn-cancel" id="modalCancel">取消</button></div></div></div>

<script type="module" src="browser-entry.js"></script>
</body>
</html>
